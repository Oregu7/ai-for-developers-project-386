name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  # ---------------------------------------------------------------
  # Job 1: Backend unit tests (Jest, fully mocked — no DB needed)
  # ---------------------------------------------------------------
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run unit tests
        run: cd backend && npm test

  # ---------------------------------------------------------------
  # Job 2: E2E tests (Playwright + full stack + Postgres)
  # ---------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
          POSTGRES_DB: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking -d booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://booking:booking@localhost:5432/booking
      PORT: 3000
      ALLOWED_ORIGINS: http://localhost:5173
      VITE_API_URL: http://localhost:3000
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install all dependencies
        run: make install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Seed database
        run: cd backend && npm run seed

      - name: Run E2E tests
        run: cd e2e && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
